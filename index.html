<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Bark Store</title>
        <link rel="icon" type="image/svg+xml" href="./img/galaxy-g-favicon.svg">
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0b0f14;
            --text-primary: #fff;
            --text-muted: rgba(255,255,255,0.8);
            --surface-card: rgba(15, 21, 30, 0.72);
            --surface-input: rgba(11, 15, 20, 0.72);
            --surface-input-strong: rgba(11, 15, 20, 0.82);
            --border-card: rgba(255,255,255,0.14);
            --border-soft: rgba(255,255,255,0.12);
            --brand-orange: #ff6b35;
            --brand-purple: #8e44ad;
            --brand-green: #38c88a;
            --brand-blue: #4aa3ff;
            --gradient-brand: linear-gradient(45deg, #ff6b35, #8e44ad);
            --font-main: Arial, sans-serif;
            --font-accent: 'Chakra Petch', 'Trebuchet MS', sans-serif;
            --font-display: 'Gugi', cursive;
            --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-page);
            color: var(--text-primary);
            padding: 20px;
            overflow-x: hidden;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface-card);
            border: 1px solid var(--border-card);
            border-radius: 15px;
            overflow: visible;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 0.25s, box-shadow 0.25s, border-color 160ms ease;
            backdrop-filter: blur(8px);
            position: relative;
        }

        /* hover: make the card border glow instead of a separate pseudo-element */
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(56, 200, 138, 0.22), 0 0 14px rgba(255,255,255,0.18), 0 20px 40px rgba(0,0,0,0.6);
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: top center;
            background: transparent;
        }

        .variant-badges {
            display: flex;
            gap: 8px;
            margin: 10px 0 6px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .variant-badge {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.35px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
        }

        .card-content {
            padding: 15px;
        }

        .card-name {
            font-family: var(--font-accent);
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 0;
            line-height: 1;
            letter-spacing: 0.35px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .level-badge {
            font-family: var(--font-mono);
            background: var(--brand-green);
            color: #072018;
            padding: 6px 11px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 0 12px rgba(56, 200, 138, 0.32), inset 0 0 0 1px rgba(255,255,255,0.06);
            line-height: 1;
        }

        .name-with-warning {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .warning-badge {
            font-family: var(--font-mono);
            background: linear-gradient(90deg,#ffb86b,#ff6b35);
            color: #1b1b1b;
            padding: 4px 8px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
            line-height: 1;
            white-space: nowrap;
        }

        .warning-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        }

        .card-description {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .card-costs {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .card-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
            font-size: 16px;
        }

        .card-stats, .card-costs-grid {
            font-family: var(--font-mono);
        }

        /* Starfield + layout from inspo */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 0;
            margin-bottom: 20px;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 2.2em;
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-right: 20px;
            white-space: nowrap;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 420px;
            min-width: 200px;
            margin: 0 20px;
        }

        #searchInput {
            font-family: var(--font-accent);
            width: 100%;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border: 2px solid var(--border-soft);
            border-radius: 25px;
            background: var(--surface-input-strong);
            color: white;
            backdrop-filter: blur(6px);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #searchInput::placeholder {
            color: rgba(255,255,255,0.62);
            letter-spacing: 0.25px;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 3px rgba(56, 200, 138, 0.22);
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        .filter-btn {
            font-family: var(--font-accent);
            padding: 8px 14px;
            border: 2px solid var(--border-soft);
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06), var(--surface-input));
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(6px);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.45px;
            text-transform: uppercase;
        }

        .filter-btn:hover {
            transform: translateY(-1px);
            border-color: rgba(255,255,255,0.24);
            background: linear-gradient(180deg, rgba(255,255,255,0.10), var(--surface-input));
        }

        .filter-btn.active {
            background: var(--gradient-brand);
            color: var(--bg-page);
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 0 10px rgba(255,107,53,0.28), 0 0 14px rgba(142,68,173,0.22);
        }

        .filter-btn.active:hover {
            background: linear-gradient(45deg, #ff7a4f, #9a56bc);
        }

        /* Modal (Buy Now) styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(8, 11, 16, 0.82);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(15, 21, 30, 0.96), rgba(24, 32, 43, 0.96));
            margin: 5% auto;
            padding: 24px;
            border: 1px solid var(--border-soft);
            border-radius: 14px;
            width: 90%;
            max-width: 520px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .close {
            color: rgba(255,255,255,0.7);
            float: right;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close:hover { color: var(--brand-orange); }

        .modal h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            background: var(--gradient-brand);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid var(--border-soft);
            border-radius: 10px;
            background: var(--surface-input);
            color: white;
            font-size: 14px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--brand-purple);
            box-shadow: 0 0 15px rgba(142, 68, 173, 0.18);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: rgba(255,255,255,0.5); }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .submit-btn {
            background: var(--gradient-brand);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 700;
            font-size: 14px;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,107,53,0.18); }

        .dm-instructions {
            margin-top: 10px;
            padding: 12px;
            background: rgba(142, 68, 173, 0.08);
            border: 1px solid rgba(142, 68, 173, 0.18);
            border-radius: 8px;
            text-align: center;
            color: rgba(255,255,255,0.85);
        }

        .dm-instructions strong { color: var(--brand-purple); }

        .stat {
            background: var(--surface-input);
            padding: 7px 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            min-height: 34px;
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 10px rgba(0,0,0,0.22);
        }

        .stat-left {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 0 0 auto;
        }

        .stat-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            border-radius: 2px;
            background: transparent;
        }

        .stat > span {
            margin-left: 0;
            align-self: center;
            font-weight: 700;
            line-height: 1;
            color: rgba(255,255,255,0.95);
        }

        .card-costs-grid {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            gap: 12px;
            font-size: 14px;
            /* margin-top: 8px; */
            /* margin-bottom: 4px; */
            align-items: center;
            flex-wrap: wrap;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 10px 0;
            border-radius: 2px;
        }

        .prices-grid {
            display: grid;
            grid-template-columns: 1fr; /* stack vertically */
            /* gap: 2px; */
            align-items: start;
        }

        .price-block {
            padding: 10px;
            border-radius: 12px;
            background: var(--surface-card);
            border: 1px solid rgba(255,255,255,0.01);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .costs-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            font-weight: 700;
            /* margin-bottom: 2px; */
        }

        @media (min-width: 900px) {
            /* on wider screens you can choose to keep stacked or side-by-side;
               keep stacked as requested */
        }

        .cost {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface-card);
            padding: 3px 3px;
            font-size: 13px;
            min-width: 0;
            justify-content: center;
            flex: 1 1 0;
        }

        .cost-icon {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
            background: var(--surface-card);
            flex: 0 0 28px;
        }

        .cost-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .cost .currency-name { color: rgba(255,255,255,0.9); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cost .currency-amount { margin-left: 0; color: #fff; font-weight: 800; flex: 0 0 auto; }

        .card-footer {
            border-top: 1px solid rgba(255,255,255,0.10);
            margin-top: 12px;
            padding-top: 12px;
            display: flex;
            gap: 10px;
        }

        .question-button, .buy-button {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        .question-button {
            background: rgba(255,255,255,0.06);
            color: white;
        }

        .question-button:hover {
            background: rgba(255,255,255,0.12);
        }

        .buy-button {
            background: var(--gradient-brand);
            color: #000;
            box-shadow: 0 0 15px rgba(255,107,53,0.35), 0 0 18px rgba(142,68,173,0.25), inset 0 0 8px rgba(255,255,255,0.06);
        }

        .buy-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 20px rgba(255,107,53,0.5), 0 0 24px rgba(142,68,173,0.45);
        }
    </style>
</head>

    <script>
        const ENABLE_BUY_FEATURE = false;

        const cardsDataScript = document.getElementById("galaxyData");
        let cards = [];
        let selectedCard = null;
        if (cardsDataScript) {
            try {
                cards = JSON.parse(cardsDataScript.textContent);
                cards = cards.map(card => ({
                    ...card,
                    category: card.category || 'dinosaur'
                }));
            } catch (e) {
                console.error("Error parsing embedded JSON:", e);
            }
        } else {
            console.error("Embedded data script '#galaxyData' not found.");
        }

        const STAT_INFO = {
            Health: { color: 'rgba(142, 68, 173, 0.34)', icon: './img/stats/health.png' },
            Stamina: { color: 'rgba(56, 200, 138, 0.34)', icon: './img/stats/stamina.png' },
            Food: { color: 'rgba(255, 107, 53, 0.34)', icon: './img/stats/food.png' },
            Water: { color: 'rgba(74, 163, 255, 0.34)', icon: './img/stats/water.png' },
            Weight: { color: 'rgba(74, 163, 255, 0.28)', icon: './img/stats/weight.png' },
            Oxygen: { color: 'rgba(74, 163, 255, 0.40)', icon: './img/stats/oxygen.png' },
            Melee: { color: 'rgba(255, 107, 53, 0.40)', icon: './img/stats/melee.png' },
            Speed: { color: 'rgba(56, 200, 138, 0.40)', icon: './img/stats/speed.png' }
        };

        const CURRENCY_INFO = {
            "Element": { rate: 1, icon: './img/currency/element.png' },
            "Polymer": { rate: 10, icon: './img/currency/polymer.png' },
            "Metal Ingot": { rate: 20, icon: './img/currency/metal_ingot.png' }
        };

        const VARIANT_INFO = {
            "Base": { color: '#8e44ad' },
            "Arkology": { color: '#38c88a' },
            "Scorched": { color: '#ff6b35' },
            "Aberrant": { color: '#4aa3ff' }
        };

        function hexToRgb(hex) {
            if (!hex) return null;
            const c = hex.replace('#','');
            if (c.length !== 6) return null;
            const r = parseInt(c.substring(0,2),16);
            const g = parseInt(c.substring(2,4),16);
            const b = parseInt(c.substring(4,6),16);
            return { r, g, b };
        }

        function getColor(stat) {
            const entry = STAT_INFO[stat];
            if (!entry) return '#3a3a3a';
            return typeof entry === 'string' ? entry : (entry.color || '#3a3a3a');
        }

        function getIcon(stat) {
            const entry = STAT_INFO[stat];
            if (entry && typeof entry === 'object' && entry.icon) return entry.icon;
            return null;
        }

        function getContrastColor(hex) {
            if (!hex) return '#fff';
            const c = hex.replace('#', '');
            const r = parseInt(c.substring(0,2),16);
            const g = parseInt(c.substring(2,4),16);
            const b = parseInt(c.substring(4,6),16);
            const luminance = (0.299*r + 0.587*g + 0.114*b)/255;
            return luminance > 0.6 ? '#000' : '#fff';
        }

        // Removed generated SVG fallback; stat icons come from STAT_INFO paths.

        function getCurrencyInfo(currency) {
            return CURRENCY_INFO[currency] || null;
        }

        

        function renderCards(list) {
            const items = list || cards;
            const container = document.getElementById("cardsContainer");
            container.innerHTML = items.map(card => `
                <div class="card">
                    ${card.warning ? `<div class="warning-badge warning-overlay" title="${card.warning}">! ${card.warning}</div>` : ''}
                    <img src="${card.image}" alt="${card.name}" class="card-image">
                    <div class="card-content">
                        <div class="card-header">
                            <div class="card-name">${card.name}</div>
                            <div class="level-badge">LVL ${card.level || 1}</div>
                        </div>
                        <div class="variant-badges">
                            ${ (card.variants || []).map(v => {
                                const vi = VARIANT_INFO[v] || { color: '#ffffff' };
                                const rgb = hexToRgb(vi.color);
                                const bg = rgb ? `rgba(${rgb.r},${rgb.g},${rgb.b},0.16)` : 'rgba(255,255,255,0.06)';
                                const border = rgb ? `rgba(${rgb.r},${rgb.g},${rgb.b},0.45)` : 'rgba(255,255,255,0.2)';
                                return `<div class="variant-badge" style="color:${vi.color};background:${bg};border-color:${border};">${v}</div>`;
                            }).join('') }
                        </div>
                        <div class="card-description">${card.description}</div>
                        <div class="card-stats">
                            ${Object.entries(card.stats || {}).map(([stat, value]) => {
                                const bg = getColor(stat);
                                const fg = '#fff';
                                const uri = getIcon(stat);
                                const iconHtml = `<img class="stat-icon" src="${uri}" alt="${stat} icon">`;
                                return `<div class="stat" style="background:${bg};color:${fg}">` +
                                    `<div class="stat-left">${iconHtml}</div>` +
                                    `<span>${value}</span>` +
                                    `</div>`;
                            }).join("")}
                        </div>

                        <div class="divider"></div>

                        <div class="costs-section">
                            <div class="prices-grid">
                                <div class="price-block">
                                    <div class="costs-subtitle">Single</div>
                                    <div class="card-costs-grid">
                                    ${Object.keys(CURRENCY_INFO).map(currency => {
                                        const cInfo = getCurrencyInfo(currency);
                                        const iconHtml = cInfo && cInfo.icon
                                            ? `<img class="cost-icon" src="${cInfo.icon}" alt="${currency} icon">`
                                            : `<span class="cost-icon"></span>`;
                                        const elementAmount = card.costs && card.costs.Element ? Number(card.costs.Element) : 0;
                                        const single = elementAmount * (cInfo && typeof cInfo.rate === 'number' ? cInfo.rate : 0);
                                        const displaySingle = Number.isInteger(single) ? single : single.toFixed(2);
                                        return `<div class="cost">${iconHtml}<span class="currency-amount">${displaySingle}</span></div>`;
                                    }).join("")}
                                    </div>
                                </div>

                                <div class="price-block">
                                    <div class="costs-subtitle">Pair (10% off)</div>
                                    <div class="card-costs-grid">
                                    ${Object.keys(CURRENCY_INFO).map(currency => {
                                        const cInfo = getCurrencyInfo(currency);
                                        const iconHtml = cInfo && cInfo.icon
                                            ? `<img class="cost-icon" src="${cInfo.icon}" alt="${currency} icon">`
                                            : `<span class="cost-icon"></span>`;
                                        const elementAmount = card.costs && card.costs.Element ? Number(card.costs.Element) : 0;
                                        const single = elementAmount * (cInfo && typeof cInfo.rate === 'number' ? cInfo.rate : 0);
                                        const pair = single * 2 * 0.9; // two items with 10% discount
                                        const displayPair = Number.isInteger(pair) ? pair : pair.toFixed(2);
                                        return `<div class="cost">${iconHtml}<span class="currency-amount">${displayPair}</span></div>`;
                                    }).join("")}
                                    </div>
                                </div>
                            </div>
                        </div>
                        ${ENABLE_BUY_FEATURE ? `
                        <div class="card-footer">
                            <button class="question-button" onclick="handleQuestion('${card.name.replace(/'/g, "\\'")}')">Question</button>
                            <button class="buy-button" onclick="handleBuy('${card.name.replace(/'/g, "\\'")}')">Buy Now</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join("");
        }

        function handleBuy(name) {
            if (!ENABLE_BUY_FEATURE) return;
            const card = cards.find(c => c.name === name);
            selectedCard = card || { name };
            const modal = document.getElementById('buyModal');
            const modalTitle = document.getElementById('modalTitle');
            const elementAmount = card && card.costs && card.costs.Element ? Number(card.costs.Element) : 0;
            modalTitle.textContent = `Purchase ${card ? card.name : name} - ${elementAmount} Element`;
            modal.style.display = 'block';
        }

        function handleQuestion(name) {
            if (!ENABLE_BUY_FEATURE) return;
            console.log('Question clicked for', name);
            alert(`Question about ${name}?`);
        }

        // Modal behavior
        (function setupModal() {
            if (!ENABLE_BUY_FEATURE) return;
            const modal = document.getElementById('buyModal');
            const closeBtn = modal.querySelector('.close');
            const buyForm = document.getElementById('buyForm');

            closeBtn.addEventListener('click', function() {
                modal.style.display = 'none';
                buyForm.reset();
            });

            window.addEventListener('click', function(event) {
                if (event.target === modal) {
                    modal.style.display = 'none';
                    buyForm.reset();
                }
            });

            buyForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const discordName = document.getElementById('discordName').value;
                const offerMessage = document.getElementById('offerMessage').value;

                const hookUrl = 'YOUR_DISCORD_WEBHOOK_URL_HERE';

                const card = selectedCard || { name: document.getElementById('modalTitle').textContent };
                const elementAmount = card && card.costs && card.costs.Element ? Number(card.costs.Element) : 0;

                // Build Single and Pair cost lines
                const singleLines = Object.keys(CURRENCY_INFO).map(cur => {
                    const info = getCurrencyInfo(cur) || { rate: 0 };
                    const amt = elementAmount * info.rate;
                    return `${cur}: ${Number.isInteger(amt) ? amt : amt.toFixed(2)}`;
                }).join('\n');

                const pairLines = Object.keys(CURRENCY_INFO).map(cur => {
                    const info = getCurrencyInfo(cur) || { rate: 0 };
                    const single = elementAmount * info.rate;
                    const pair = single * 2 * 0.9;
                    return `${cur}: ${Number.isInteger(pair) ? pair : pair.toFixed(2)}`;
                }).join('\n');

                const embed = {
                    title: `New Offer: ${card.name}`,
                    color: 16736536,
                    thumbnail: card.image ? { url: card.image } : undefined,
                    fields: [
                        { name: 'Item', value: `${card.name} ${card.level ? `(LVL ${card.level})` : ''}`, inline: false },
                        { name: 'Single Costs', value: singleLines || 'N/A', inline: false },
                        { name: 'Pair Costs (10% off)', value: pairLines || 'N/A', inline: false },
                        { name: 'Discord', value: discordName || 'N/A', inline: true },
                        { name: 'Offer Message', value: offerMessage || '—', inline: false }
                    ],
                    timestamp: new Date().toISOString()
                };

                try {
                    const res = await fetch(hookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ embeds: [embed] })
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    alert('Offer submitted — thank you!');
                } catch (err) {
                    console.error('Webhook error:', err);
                    const msg = `Failed to submit offer. This is commonly caused by the browser blocking the request (CORS).\n\n` +
                        `Quick fixes:\n` +
                        `- Run a small local proxy that forwards requests to Discord (instructions in project).\n` +
                        `- Or run the following curl command from a terminal to test the webhook:\n\n` +
                        `curl -H \"Content-Type: application/json\" -X POST -d '${JSON.stringify({ embeds: [ { title: `New Offer: ${card.name}` } ] })}' ${hookUrl}\n\n` +
                        `See console for details.`;
                    alert(msg);
                }

                modal.style.display = 'none';
                buyForm.reset();
                selectedCard = null;
            });
        })();

        // Search & Filters
        function searchCards() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            let results = activeFilter === 'all' ? cards.slice() : cards.filter(card => {
                if (Array.isArray(card.category)) {
                    return card.category.some(cat => String(cat).toLowerCase() === activeFilter);
                }
                return String(card.category || '').toLowerCase() === activeFilter;
            });

            if (searchTerm) {
                results = results.filter(card => (card.name && card.name.toLowerCase().includes(searchTerm)) || (card.description && card.description.toLowerCase().includes(searchTerm)));
            }

            renderCards(results);
        }

        document.getElementById('searchInput').addEventListener('input', searchCards);
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                searchCards();
            });
        });

        // Starfield animation
        (function starfieldSetup() {
            const sf = document.getElementById('starfield');
            const ctx = sf.getContext('2d');

            function drawStars() {
                const width = sf.width;
                const height = sf.height;
                ctx.clearRect(0, 0, width, height);
                const numStars = Math.random() * 200 + 400;
                for (let i = 0; i < numStars; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const radius = Math.random() * 2 + 0.2;
                    const brightness = Math.random();
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${brightness})`;
                    ctx.shadowBlur = Math.random() * 4 + 1;
                    ctx.shadowColor = 'white';
                    ctx.fill();
                }
            }

            function resizeCanvas() {
                sf.width = window.innerWidth;
                sf.height = window.innerHeight;
                drawStars();
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        })();

        // Initial render
        renderCards();
    </script>
</body>
</html>
