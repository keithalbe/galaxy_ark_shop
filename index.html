<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Bark Store</title>
    <link rel="icon" type="image/svg+xml" href="./img/galaxy-g-favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gugi&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <canvas id="starfield"></canvas>

    <main class="container">
        <header class="search-filter-section">
            <h1 class="logo">GALAXY</h1>
            <div class="search-container" role="search">
                <input type="text" id="searchInput" placeholder="Search the GALAXY..." aria-label="Search creatures and items">
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="dinosaur">Dinosaurs</button>
                <button class="filter-btn" data-filter="resource">Resource</button>
                <button class="filter-btn" data-filter="structure">Structure</button>
            </div>
        </header>

        <section class="cards-grid" id="cardsContainer" aria-live="polite"></section>
    </main>

    <script src="./assets/js/main.js" defer></script>
</body>
</html>
